<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="heart" id="heart-icon">❤️</div>
        
        <div class="message-box">
            <h1 id="main-title">I'm Truly Sorry</h1>
            <p id="sub-text">I hate that I upset you. You deserve the world, and I'm ready to give it to you. ✨</p>
            
            <div class="btn-group">
                <button id="forgive-btn" onclick="celebrate()">Forgive Me? ❤️</button>
                <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()">No</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
