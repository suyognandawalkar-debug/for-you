<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You</title>
</head>
<body>
    <div id="container">
        <div class="heart" id="heart-icon">❤️</div>
        
        <div class="message-box">
            <h1 id="main-title">I'm Truly Sorry</h1>
            <p id="sub-text">I acted like a bug in a production environment. 🐛<br>Can we deploy a fix together?</p>
            
            <div class="btn-group">
                <button id="forgive-btn" onclick="celebrate()">Yes, I Forgive You ✨</button>
                <button id="no-btn" onmouseover="moveButton()">Maybe Not</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
