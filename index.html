<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .heart {
            font-size: 80px;
            animation: pulse 1.5s infinite;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .message-box {
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s forwards ease-in-out;
            animation-delay: 0.5s;
            padding: 0 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.8rem; color: #ff4d4d; }
        p { font-size: 1.1rem; line-height: 1.6; color: #cccccc; }
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    
    <div class="message-box">
        <h1>I'm Truly Sorry</h1>
        <p>
            I know I messed up, and I hate that it hurt you.<br>
            तुझ्या रुसण्यानी मला फरक पडतो, आणि I’d love a chance<br>
            to make things right. 
        </p>
        <p><strong>So Sorry सपी 😘</strong></p>
    </div>

</body>
</html>
